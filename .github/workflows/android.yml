name: Android CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Prepare project
        run: |
          # 复制所有必要文件到根目录
          mkdir -p app gradle/wrapper
          
          # 复制 Android 项目文件
          if [ -d "android/app" ]; then
            cp -r android/app app
          fi
          if [ -d "android/gradle/wrapper" ]; then
            cp -r android/gradle/wrapper gradle/wrapper
          fi
          if [ -f "android/build.gradle.kts" ]; then
            cp android/build.gradle.kts build.gradle.kts
          fi
          if [ -f "android/settings.gradle.kts" ]; then
            cp android/settings.gradle.kts settings.gradle.kts
          fi
          if [ -f "android/gradle.properties" ]; then
            cp android/gradle.properties gradle.properties
          fi
          if [ -f "android/gradlew" ]; then
            cp android/gradlew gradlew
            chmod +x gradlew
          fi
          if [ -f "android/gradlew.bat" ]; then
            cp android/gradlew.bat gradlew.bat
          fi
          
          # 删除 android 目录避免冲突
          rm -rf android
          
          # 验证项目结构
          echo "=== 根目录 ==="
          ls -la
          echo "=== app 目录 ==="
          ls -la app/
          echo "=== gradle/wrapper 目录 ==="
          ls -la gradle/wrapper/
          echo "=== settings.gradle.kts 内容 ==="
          cat settings.gradle.kts

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.4
          arguments: assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: pinyin-park-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
