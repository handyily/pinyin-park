name: Android CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Prepare project
        run: |
          mkdir -p app gradle/wrapper
          
          # 复制 Android 项目文件
          cp -r android/app app/
          cp -r android/gradle/wrapper gradle/wrapper/
          cp android/build.gradle.kts build.gradle.kts
          cp android/settings.gradle.kts settings.gradle.kts
          cp android/gradle.properties gradle.properties
          
          # 复制 gradlew（如果存在）
          if [ -f "android/gradlew" ]; then
            cp android/gradlew gradlew
            chmod +x gradlew
          fi
          if [ -f "android/gradlew.bat" ]; then
            cp android/gradlew.bat gradlew.bat
          fi
          
          # 删除 android 目录
          rm -rf android
          
          # 验证项目结构
          echo "=== 根目录文件 ==="
          ls -la
          echo "=== app 目录 ==="
          ls -la app/
          echo "=== settings.gradle.kts ==="
          cat settings.gradle.kts

      - name: Download Gradle 8.4
        run: |
          cd /tmp
          curl -fsSL -o gradle.zip https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle.zip
          export PATH="/tmp/gradle-8.4/bin:$PATH"
          gradle --version

      - name: Build with Gradle
        run: |
          export PATH="/tmp/gradle-8.4/bin:$PATH"
          gradle assembleDebug --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: pinyin-park-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
