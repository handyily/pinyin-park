name: Android CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Prepare project structure
        run: |
          echo "=== 当前目录结构 ==="
          ls -la

          # android 目录作为项目根目录
          cd android
          echo "=== android 目录 ==="
          ls -la

          # 确保 gradle wrapper jar 存在
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "ERROR: gradle-wrapper.jar 不存在"
            exit 1
          fi
          echo "=== gradle wrapper ==="
          ls -la gradle/wrapper/

      - name: Build with Gradle
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Check APK output
        working-directory: android
        run: |
          echo "=== APK 文件 ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK目录不存在"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: pinyin-park-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
