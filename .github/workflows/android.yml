name: Android CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Prepare project
        run: |
          if [ -d "android" ]; then
            mkdir -p app gradle/wrapper
            cp -r android/app app
            cp -r android/gradle/wrapper gradle/wrapper
            cp -r android/build.gradle.kts build.gradle.kts
            cp -r android/settings.gradle.kts settings.gradle.kts
            cp -r android/gradle.properties gradle.properties
            rm -rf android
          fi
          echo "=== 项目文件 ==="
          ls -la

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.4
          arguments: assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: pinyin-park-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
