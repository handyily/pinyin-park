name: Android CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Move Android project to root
        run: |
          if [ -d "android" ]; then
            mkdir -p app gradle/wrapper build app/src
            cp -r android/app/* app/
            cp -r android/gradle/wrapper gradle/wrapper
            cp -r android/gradlew gradlew 2>/dev/null || true
            cp -r android/gradlew.bat gradlew.bat 2>/dev/null || true
            cp -r android/build.gradle.kts build.gradle.kts
            cp -r android/settings.gradle.kts settings.gradle.kts
            cp -r android/gradle.properties gradle.properties
            rm -rf android
          fi
          ls -la gradle/wrapper/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: |
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: pinyin-park-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
