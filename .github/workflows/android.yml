name: Android CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Move Android project to root
        run: |
          if [ -d "android" ]; then
            cp -r android/app app
            cp -r android/gradle gradle
            cp -r android/gradlew gradlew
            cp -r android/gradlew.bat gradlew.bat
            cp -r android/build.gradle.kts build.gradle.kts
            cp -r android/settings.gradle.kts settings.gradle.kts
            cp -r android/gradle.properties gradle.properties
            rm -rf android
          fi

      - name: Download gradle-wrapper.jar v8.4
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar"
          ls -la gradle/wrapper/
          # 验证文件大小
          SIZE=$(wc -c < gradle/wrapper/gradle-wrapper.jar)
          echo "gradle-wrapper.jar size: $SIZE bytes"
          if [ "$SIZE" -lt 50000 ]; then
            echo "ERROR: gradle-wrapper.jar 无效 (size: $SIZE bytes)"
            exit 1
          fi

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: pinyin-park-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
