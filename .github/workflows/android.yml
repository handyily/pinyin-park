name: Android CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Move Android project to root
        if: always()
        run: |
          if [ -d "android" ]; then
            cp -r android/app app
            cp -r android/gradle gradle
            cp -r android/gradlew gradlew
            cp -r android/gradlew.bat gradlew.bat
            cp -r android/build.gradle.kts build.gradle.kts
            cp -r android/settings.gradle.kts settings.gradle.kts
            cp -r android/gradle.properties gradle.properties
            rm -rf android
          fi

      - name: Fix gradle-wrapper.jar
        run: |
          # 检查 jar 文件是否有效（应该 > 50KB）
          if [ -f gradle/wrapper/gradle-wrapper.jar ]; then
            SIZE=$(wc -c < gradle/wrapper/gradle-wrapper.jar)
            if [ "$SIZE" -lt 1000 ]; then
              echo "gradle-wrapper.jar 损坏 ($SIZE bytes)，删除并重新生成..."
              rm gradle/wrapper/gradle-wrapper.jar
            fi
          fi
          # 使用 gradle 命令生成 wrapper
          gradle wrapper --gradle-version 8.4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pinyin-park-apk
          path: app/build/outputs/apk/debug/app-debug.apk
