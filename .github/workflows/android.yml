name: Android CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Move Android project files to root
        run: |
          # 先移动除 .github 外的所有文件
          shopt -s dotglob
          for item in android/*; do
            if [ "$(basename "$item")" != ".github" ]; then
              mv "$item" . 2>/dev/null || true
            fi
          done
          # 删除空的 android 目录
          rmdir android 2>/dev/null || rm -rf android

      - name: Verify gradlew exists
        run: |
          ls -la gradlew
          ls -la gradle/wrapper/

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pinyin-park-apk
          path: app/build/outputs/apk/debug/app-debug.apk
