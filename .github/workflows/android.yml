name: Android CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Move Android project to root
        run: |
          if [ -d "android" ]; then
            cp -r android/app app
            cp -r android/gradle gradle
            cp -r android/gradlew gradlew
            cp -r android/gradlew.bat gradlew.bat
            cp -r android/build.gradle.kts build.gradle.kts
            cp -r android/settings.gradle.kts settings.gradle.kts
            cp -r android/gradle.properties gradle.properties
            rm -rf android
          fi
          ls -la

      - name: Fix gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          # 使用更可靠的 URL 下载
          curl -fsSL --connect-timeout 30 --max-time 120 \
            -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/nicerobot/nicerobot.github.io/raw/main/gradle/wrapper/gradle-wrapper.jar"
          SIZE=$(wc -c < gradle/wrapper/gradle-wrapper.jar 2>/dev/null || echo 0)
          echo "gradle-wrapper.jar size: $SIZE bytes"
          if [ "$SIZE" -lt 50000 ]; then
            echo "下载的 jar 无效，尝试备用方案..."
            # 备用：使用 services.gradle.org 的 wrapper
            gradle wrapper --gradle-version 8.4 --distribution-type bin
          fi
          ls -la gradle/wrapper/

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: assembleDebug --no-daemon --stacktrace
          gradle-version: 8.4

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: pinyin-park-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
